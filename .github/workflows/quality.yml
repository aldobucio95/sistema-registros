name: Quality checks

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:utf8
      - run: pnpm run test
      - run: pnpm run check:invariants
      - run: pnpm run build
