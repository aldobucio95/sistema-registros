# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Secret FIREBASE_SERVICE_ACCOUNT_REGISTROS_VNPM: cuenta de servicio JSON del proyecto registros-vnpm.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile && pnpm run check:utf8 && pnpm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_REGISTROS_VNPM }}
          channelId: live
          projectId: registros-vnpm
